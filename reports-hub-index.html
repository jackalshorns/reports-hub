// ── Global state ──────────────────────────────────────────────────────────
var HUB_DATA = null;
var BRIEF_DATA = {};
var activeTag = 'all';
var sortOrder = 'newest';
var activePopover = null;

// ── Storage helpers ────────────────────────────────────────────────────────
function getStarred() {
  try { return JSON.parse(localStorage.getItem('hub_starred') || '[]'); } catch(e) { return []; }
}
function setStarred(arr) {
  try { localStorage.setItem('hub_starred', JSON.stringify(arr)); } catch(e) {}
}
function getStarredId(entry) {
  return (typeof entry === 'string') ? entry : entry.id;
}
function isStarred(itemId) {
  var starred = getStarred();
  for (var i = 0; i < starred.length; i++) {
    if (getStarredId(starred[i]) === itemId) return true;
  }
  return false;
}
function toggleStar(itemId, meta) {
  var starred = getStarred();
  var idx = -1;
  for (var i = 0; i < starred.length; i++) {
    if (getStarredId(starred[i]) === itemId) { idx = i; break; }
  }
  if (idx !== -1) {
    starred.splice(idx, 1);
  } else {
    starred.push(meta || itemId);
  }
  setStarred(starred);
}
function getSavedTags() {
  try { return JSON.parse(localStorage.getItem('hub_retag') || '{}'); } catch(e) { return {}; }
}
function setSavedTag(id, tag) {
  var t = getSavedTags();
  if (tag === null) delete t[id]; else t[id] = tag;
  try { localStorage.setItem('hub_retag', JSON.stringify(t)); } catch(e) {}
}

// ── Tag Memory (per-tag notes, localStorage) ───────────────────────────
function getTagMemory(tag) {
  try { return JSON.parse(localStorage.getItem('hub_tag_memory_' + tag) || '[]'); } catch(e) { return []; }
}
function addTagMemoryEntry(tag, text) {
  var entries = getTagMemory(tag);
  entries.push({ date: new Date().toISOString().slice(0, 10), text: text });
  try { localStorage.setItem('hub_tag_memory_' + tag, JSON.stringify(entries)); } catch(e) {}
}

// ── Tag definitions ─────────────────────────────────────────────────────
var TAG_DEFS = {
  morning:     { label: '\u2600\uFE0F Morning Briefs',   cls: 'morning'     },
  accelerator: { label: '\uD83C\uDFAF GPA',              cls: 'accelerator' },
  serbia:      { label: '\uD83C\uDDF7\uD83C\uDDF8 SRS',  cls: 'serbia'      },
  artifacts:   { label: '\uD83D\uDCE6 Artifacts',        cls: 'artifacts'   },
  research:    { label: '\uD83D\uDD2C Research',          cls: 'research'    }
};

// ── Render cards from hub-data.json (sloppy click — whole card opens) ─────
function renderCards(cards) {
  var grid = document.getElementById('cardsGrid');
  if (!grid || !cards || !cards.length) return;

  cards.forEach(function(card) {
    var def = TAG_DEFS[card.tag] || TAG_DEFS.artifacts;
    var el = document.createElement('div');
    el.className = 'report-card';
    el.dataset.tags = card.tag;
    el.dataset.date = card.date;
    el.dataset.url = card.url;
    el.setAttribute('role', 'link');
    el.setAttribute('tabindex', '0');

    el.innerHTML =
      '<div class="card-accent accent-' + def.cls + '"></div>' +
      '<div class="card-body">' +
        '<div class="card-type">' + escapeHtml(card.type) + '</div>' +
        '<div class="card-title">' + escapeHtml(card.title) + '</div>' +
        '<div class="card-desc">' + escapeHtml(card.desc) + '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<div class="card-tags"><span class="card-tag card-tag-' + def.cls + '">' + def.label + '</span></div>' +
        '<div class="card-actions">' +
          '<button class="star-btn" data-id="' + escapeHtml(card.id) + '" title="Star this">\u2B50</button>' +
        '</div>' +
      '</div>';

    // Sloppy click: whole card opens URL
    el.addEventListener('click', function() {
      window.location.href = card.url;
    });
    // Keyboard: Enter/Space also opens
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        window.location.href = card.url;
      }
    });

    grid.appendChild(el);
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Retag logic ────────────────────────────────────────────────────────────
function applyRetag(card, tag) {
  var def = TAG_DEFS[tag];
  if (!def) return;
  card.dataset.tags = tag;
  var accent = card.querySelector('.card-accent');
  if (accent) accent.className = 'card-accent accent-' + def.cls;
  var pill = card.querySelector('.card-tag');
  if (pill) { pill.className = 'card-tag card-tag-' + def.cls; pill.textContent = def.label; }
}

function showRetagPopover(card, btn, cardId) {
  if (activePopover) { activePopover.remove(); activePopover = null; }

  var currentTag = card.dataset.tags;
  var savedTags  = getSavedTags();
  var isRetagged = !!savedTags[cardId];

  var pop = document.createElement('div');
  pop.className = 'retag-popover';

  Object.keys(TAG_DEFS).forEach(function(key) {
    var def = TAG_DEFS[key];
    var opt = document.createElement('button');
    opt.className = 'retag-option' + (key === currentTag ? ' active' : '');
    opt.textContent = def.label;
    opt.addEventListener('click', function(e) {
      e.stopPropagation();
      applyRetag(card, key);
      setSavedTag(cardId, key);
      pop.remove(); activePopover = null;
      applyFilter();
    });
    pop.appendChild(opt);
  });

  if (isRetagged) {
    var reset = document.createElement('button');
    reset.className = 'retag-option retag-reset';
    reset.textContent = '\u21A9 Reset to original';
    reset.addEventListener('click', function(e) {
      e.stopPropagation();
      setSavedTag(cardId, null);
      pop.remove(); activePopover = null;
      location.reload();
    });
    pop.appendChild(reset);
  }

  document.body.appendChild(pop);
  activePopover = pop;

  var r = btn.getBoundingClientRect();
  var top  = r.bottom + window.scrollY + 6;
  var left = r.left   + window.scrollX;
  if (left + 220 > window.innerWidth - 12) left = r.right + window.scrollX - 220;
  pop.style.top  = top  + 'px';
  pop.style.left = left + 'px';

  setTimeout(function() {
    document.addEventListener('click', function() {
      if (activePopover) { activePopover.remove(); activePopover = null; }
    }, { once: true });
  }, 0);
}

// ── Exec Summary rendering ────────────────────────────────────────────────
function renderExecSummary() {
  var container = document.getElementById('execSummaryView');
  if (!container) return;
  container.innerHTML = '';

  var exec = (HUB_DATA && HUB_DATA.execSummary) ? HUB_DATA.execSummary : {};
  var hasKpis = exec.kpis && exec.kpis.length > 0;
  var hasFlags = exec.flags && exec.flags.length > 0;
  var hasInitiatives = exec.initiatives && exec.initiatives.length > 0;

  if (!hasKpis && !hasFlags && !hasInitiatives) {
    container.innerHTML = '<div class="exec-empty">Exec summary data will appear here as reports are published.</div>';
    return;
  }

  // KPIs
  if (hasKpis) {
    var kpiTitle = document.createElement('div');
    kpiTitle.className = 'exec-section-title';
    kpiTitle.textContent = 'Key Metrics';
    container.appendChild(kpiTitle);

    var kpiGrid = document.createElement('div');
    kpiGrid.className = 'exec-kpis';
    exec.kpis.forEach(function(kpi) {
      var trendArrow = kpi.trend === 'up' ? '\u2191' : kpi.trend === 'down' ? '\u2193' : '\u2192';
      var card = document.createElement('div');
      card.className = 'exec-kpi';
      card.innerHTML =
        '<div class="exec-kpi-value">' + escapeHtml(String(kpi.value)) + '</div>' +
        '<div class="exec-kpi-label">' + escapeHtml(kpi.label) + '</div>' +
        '<div class="exec-kpi-trend ' + escapeHtml(kpi.trend || 'flat') + '">' + trendArrow + '</div>';
      kpiGrid.appendChild(card);
    });
    container.appendChild(kpiGrid);
  }

  // Flags
  if (hasFlags) {
    var flagTitle = document.createElement('div');
    flagTitle.className = 'exec-section-title';
    flagTitle.textContent = 'Flags';
    container.appendChild(flagTitle);

    var flagWrap = document.createElement('div');
    flagWrap.className = 'exec-flags';
    exec.flags.forEach(function(flag) {
      var row = document.createElement('div');
      row.className = 'exec-flag ' + escapeHtml(flag.level || 'info');
      row.textContent = flag.text;
      flagWrap.appendChild(row);
    });
    container.appendChild(flagWrap);
  }

  // Initiatives
  if (hasInitiatives) {
    var initTitle = document.createElement('div');
    initTitle.className = 'exec-section-title';
    initTitle.textContent = 'Strategic Initiatives';
    container.appendChild(initTitle);

    var initWrap = document.createElement('div');
    initWrap.className = 'exec-initiatives';
    exec.initiatives.forEach(function(init) {
      var row = document.createElement('div');
      row.className = 'exec-initiative';
      row.innerHTML =
        '<span class="exec-status ' + escapeHtml(init.status || 'on-track') + '">' + escapeHtml(init.status || 'on-track') + '</span>' +
        '<span class="exec-initiative-title">' + escapeHtml(init.title) + '</span>' +
        '<span class="exec-initiative-detail">' + escapeHtml(init.detail || '') + '</span>';
      initWrap.appendChild(row);
    });
    container.appendChild(initWrap);
  }
}

// ── Starred List rendering (compact rows) ─────────────────────────────────
function renderStarredList() {
  var container = document.getElementById('starredList');
  if (!container) return;
  container.innerHTML = '';

  var starred = getStarred();
  if (!starred.length) {
    container.innerHTML = '<div class="starred-empty">No starred items yet. Star any card to see it here.</div>';
    return;
  }

  // Merge hub-data.json starred with localStorage starred
  var jsonStarred = (HUB_DATA && HUB_DATA.starred) ? HUB_DATA.starred : [];
  var mergedIds = {};
  var mergedList = [];

  // Add all from localStorage
  starred.forEach(function(entry) {
    var id = getStarredId(entry);
    if (!mergedIds[id]) { mergedIds[id] = true; mergedList.push(entry); }
  });
  // Add any from hub-data.json not already present
  jsonStarred.forEach(function(entry) {
    var id = getStarredId(entry);
    if (!mergedIds[id]) { mergedIds[id] = true; mergedList.push(entry); }
  });

  // Resolve each starred entry to { id, title, date, tag, url }
  var resolved = [];
  mergedList.forEach(function(entry) {
    var id = getStarredId(entry);
    var item = resolveStarredItem(id, entry);
    if (item) resolved.push(item);
  });

  // Sort newest first
  resolved.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

  if (!resolved.length) {
    container.innerHTML = '<div class="starred-empty">No starred items could be resolved.</div>';
    return;
  }

  resolved.forEach(function(item) {
    var row = document.createElement('div');
    row.className = 'starred-row';
    row.setAttribute('role', 'link');
    row.setAttribute('tabindex', '0');

    var tagDef = TAG_DEFS[item.tag] || TAG_DEFS.artifacts;
    var fmtDate = item.date ? formatShortDate(item.date) : '';

    row.innerHTML =
      '<span class="starred-title">' + escapeHtml(item.title) + '</span>' +
      '<span class="starred-date">' + escapeHtml(fmtDate) + '</span>' +
      '<span class="starred-tag card-tag card-tag-' + tagDef.cls + '">' + tagDef.label + '</span>' +
      '<button class="star-btn starred" data-id="' + escapeHtml(item.id) + '" title="Unstar">\u2B50</button>';

    // Click row (except star) → open URL
    row.addEventListener('click', function() {
      window.location.href = item.url;
    });
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        window.location.href = item.url;
      }
    });

    // Star button → unstar, re-render
    var starBtn = row.querySelector('.star-btn');
    starBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleStar(item.id);
      renderStarredList();
    });

    container.appendChild(row);
  });
}

function resolveStarredItem(id, entry) {
  if (!HUB_DATA) return null;

  // Card ID: look up in cards[]
  if (id.indexOf('brief:') !== 0) {
    var cards = HUB_DATA.cards || [];
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].id === id) {
        return { id: id, title: cards[i].title, date: cards[i].date, tag: cards[i].tag, url: cards[i].url };
      }
    }
    return null;
  }

  // Whole brief: "brief:YYYY-MM-DD"
  var briefMatch = id.match(/^brief:(\d{4}-\d{2}-\d{2})$/);
  if (briefMatch) {
    var dateKey = briefMatch[1];
    var brief = (HUB_DATA.morningBriefs || {})[dateKey];
    if (!brief) return null;
    var d = new Date(dateKey + 'T12:00:00');
    var title = 'Morning Brief \u2014 ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getDate();
    return { id: id, title: title, date: dateKey, tag: 'morning', url: brief.url };
  }

  // Brief item: "brief:YYYY-MM-DD#mtg-N"
  var itemMatch = id.match(/^brief:(\d{4}-\d{2}-\d{2})(#.+)$/);
  if (itemMatch) {
    var dateKey2 = itemMatch[1];
    var anchor = itemMatch[2];
    var brief2 = (HUB_DATA.morningBriefs || {})[dateKey2];
    if (!brief2) return null;
    // Use metadata title if entry is an object, otherwise fallback
    var itemTitle = (typeof entry === 'object' && entry.title) ? entry.title : 'Meeting ' + anchor.replace('#mtg-', '');
    var itemTag = (typeof entry === 'object' && entry.tag) ? entry.tag : 'morning';
    return { id: id, title: itemTitle, date: dateKey2, tag: itemTag, url: brief2.url + anchor };
  }

  return null;
}

function formatShortDate(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

// ── Init — wire up stars, retags, filters, sort ───────────────────────────
function init() {
  var savedTags = getSavedTags();

  document.querySelectorAll('.report-card').forEach(function(card) {
    var actions = card.querySelector('.card-actions');
    var starBtn = card.querySelector('.star-btn');
    var cardId  = starBtn ? starBtn.dataset.id : null;
    if (!actions || !cardId) return;

    if (savedTags[cardId]) applyRetag(card, savedTags[cardId]);

    if (isStarred(cardId)) starBtn.classList.add('starred');
    starBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleStar(cardId);
      starBtn.classList.toggle('starred');
      applyFilter();
    });

    var retagBtn = document.createElement('button');
    retagBtn.className = 'retag-btn';
    retagBtn.title     = 'Move to a different category';
    retagBtn.textContent = '\u270F\uFE0F';
    retagBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      showRetagPopover(card, retagBtn, cardId);
    });
    actions.insertBefore(retagBtn, starBtn);
  });

  document.querySelectorAll('.tag-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeTag = btn.dataset.tag;
      document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      applyFilter();
    });
  });

  document.getElementById('sortNewest').addEventListener('click', function() {
    sortOrder = 'newest';
    document.getElementById('sortNewest').classList.add('active');
    document.getElementById('sortOldest').classList.remove('active');
    applyFilter();
  });
  document.getElementById('sortOldest').addEventListener('click', function() {
    sortOrder = 'oldest';
    document.getElementById('sortOldest').classList.add('active');
    document.getElementById('sortNewest').classList.remove('active');
    applyFilter();
  });

  applyFilter();
}

// ── Tag Memory Cards ──────────────────────────────────────────────────────
function renderTagCards() {
  var container = document.getElementById('tagsView');
  if (!container) return;
  container.innerHTML = '';

  var tagMemData = (HUB_DATA && HUB_DATA.tagMemory) || {};

  Object.keys(TAG_DEFS).forEach(function(tag) {
    if (tag === 'morning') return; // skip morning briefs — they have their own tab

    var def = TAG_DEFS[tag];
    var mem = tagMemData[tag] || {};
    var canonical = mem.entries || [];
    var local = getTagMemory(tag);
    var allEntries = canonical.concat(local);
    allEntries.sort(function(a, b) { return b.date < a.date ? -1 : b.date > a.date ? 1 : 0; });

    var card = document.createElement('div');
    card.className = 'tag-memory-card card-tag-' + def.cls;
    card.setAttribute('role', 'region');
    card.setAttribute('aria-label', def.label + ' memory');

    var headerHtml = '<div class="tag-memory-header">' +
      '<span class="tag-memory-label">' + escapeHtml(def.label) + '</span>' +
      '<span class="tag-memory-count">' + allEntries.length + ' note' + (allEntries.length !== 1 ? 's' : '') + '</span>' +
      '</div>';

    var summaryHtml = mem.summary
      ? '<p class="tag-memory-summary">' + escapeHtml(mem.summary) + '</p>'
      : '';

    var entriesHtml = '<div class="tag-memory-entries">';
    allEntries.forEach(function(entry) {
      entriesHtml += '<div class="tag-memory-entry">' +
        '<span class="tag-memory-date">' + escapeHtml(entry.date) + '</span> ' +
        '<span class="tag-memory-text">' + escapeHtml(entry.text) + '</span>' +
        '</div>';
    });
    if (allEntries.length === 0) {
      entriesHtml += '<div class="tag-memory-empty">No notes yet. Add one below.</div>';
    }
    entriesHtml += '</div>';

    var inputHtml = '<div class="tag-memory-input">' +
      '<textarea class="tag-memory-textarea" placeholder="Add a note for ' + escapeHtml(def.label) + '..." rows="2"></textarea>' +
      '<button class="tag-memory-save" data-tag="' + escapeHtml(tag) + '">Save Note</button>' +
      '</div>';

    card.innerHTML = headerHtml + summaryHtml + entriesHtml + inputHtml;

    // Wire up save button
    var saveBtn = card.querySelector('.tag-memory-save');
    var textarea = card.querySelector('.tag-memory-textarea');
    saveBtn.addEventListener('click', function() {
      var text = textarea.value.trim();
      if (!text) return;
      addTagMemoryEntry(tag, text);
      textarea.value = '';
      renderTagCards(); // re-render to show new entry
    });

    container.appendChild(card);
  });
}

// ── Filter & sort ─────────────────────────────────────────────────────────
function applyFilter() {
  var grid = document.getElementById('cardsGrid');
  var containerDiv = document.querySelector('.container');
  var mbSec = document.getElementById('mbSection');
  var execView = document.getElementById('execSummaryView');
  var starredView = document.getElementById('starredList');
  var tagsView = document.getElementById('tagsView');
  var emptyState = document.getElementById('emptyState');
  var resultsMeta = document.getElementById('resultsMeta');
  var sortControls = document.querySelector('.sort-controls');

  // Hide all view containers first
  if (grid) grid.style.display = 'none';
  if (containerDiv) containerDiv.style.display = 'none';
  if (mbSec) mbSec.style.display = 'none';
  if (execView) execView.style.display = 'none';
  if (starredView) starredView.style.display = 'none';
  if (tagsView) tagsView.style.display = 'none';
  if (emptyState) emptyState.style.display = 'none';

  // ── Exec Summary tab ──
  if (activeTag === 'all') {
    if (execView) execView.style.display = '';
    if (sortControls) sortControls.style.display = 'none';
    renderExecSummary();
    return;
  }

  // ── Starred tab (compact list) ──
  if (activeTag === 'starred') {
    if (starredView) starredView.style.display = '';
    if (sortControls) sortControls.style.display = 'none';
    renderStarredList();
    return;
  }

  // ── Tags tab (per-tag memory) ──
  if (activeTag === 'tags') {
    if (tagsView) tagsView.style.display = '';
    if (sortControls) sortControls.style.display = 'none';
    renderTagCards();
    return;
  }

  // ── Morning Briefs tab ──
  if (activeTag === 'morning') {
    if (mbSec) mbSec.style.display = '';
    if (sortControls) sortControls.style.display = 'none';
    return;
  }

  // ── Category tabs (card grid) ──
  if (sortControls) sortControls.style.display = '';
  if (containerDiv) containerDiv.style.display = '';
  if (grid) grid.style.display = '';

  var cards = Array.from(grid.querySelectorAll('.report-card'));

  var visible = cards.filter(function(card) {
    var tags = card.dataset.tags.split(' ');
    return tags.indexOf(activeTag) !== -1;
  });

  visible.sort(function(a, b) {
    var da = new Date(a.dataset.date), db = new Date(b.dataset.date);
    return sortOrder === 'newest' ? db - da : da - db;
  });

  cards.forEach(function(c) { c.classList.add('hidden'); });
  visible.forEach(function(c, i) { c.classList.remove('hidden'); c.style.order = i; });

  if (emptyState) emptyState.style.display = visible.length === 0 ? 'block' : 'none';

  var total = cards.length;
  if (resultsMeta) {
    resultsMeta.textContent =
      visible.length === total
        ? total + ' report' + (total !== 1 ? 's' : '')
        : visible.length + ' of ' + total + ' reports';
  }
}

// ── Morning Briefs calendar ───────────────────────────────────────────────

function pad(n) { return String(n).padStart(2, '0'); }
function fmtKey(y, m, d) { return y + '-' + pad(m + 1) + '-' + pad(d); }

var TODAY_KEY = new Date().toISOString().slice(0, 10);
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderRecentCards() {
  var wrap = document.getElementById('mbRecent');
  if (!wrap) return;

  var sorted = Object.entries(BRIEF_DATA).sort(function(a, b) {
    return b[0].localeCompare(a[0]);
  }).slice(0, 3);

  sorted.forEach(function(entry) {
    var dateKey = entry[0], data = entry[1];
    var d = new Date(dateKey + 'T12:00:00');
    var isToday = dateKey === TODAY_KEY;
    var dayName = DAY_NAMES[d.getDay()];
    var monthDay = MONTH_NAMES[d.getMonth()] + ' ' + d.getDate();
    var total = data.int + data.ext;

    var card = document.createElement('a');
    card.href = data.url;
    card.target = '_self';
    card.className = 'mb-day-card' + (isToday ? ' today' : '');
    card.innerHTML =
      '<div class="mb-day-label">' + dayName + (isToday ? '<span class="today-badge">Today</span>' : '') + '</div>' +
      '<div class="mb-day-date">' + monthDay + '</div>' +
      '<div class="mb-day-stats">' +
        '<span>' + total + ' meeting' + (total !== 1 ? 's' : '') + '</span>' +
        (data.int ? '<span class="stat-int">\u25CF ' + data.int + ' int</span>' : '') +
        (data.ext ? '<span class="stat-ext">\u25CF ' + data.ext + ' ext</span>' : '') +
      '</div>';
    wrap.appendChild(card);
  });
}

function renderCalendar() {
  var wrap = document.getElementById('mbCalWrap');
  if (!wrap) return;

  var allDates = Object.keys(BRIEF_DATA).sort();
  if (allDates.length === 0) return;

  var firstDate = new Date(allDates[0] + 'T12:00:00');
  var now = new Date(TODAY_KEY + 'T12:00:00');

  var months = [];
  var cursor = new Date(now.getFullYear(), now.getMonth(), 1);
  var earliest = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  while (cursor >= earliest) {
    months.push({ year: cursor.getFullYear(), month: cursor.getMonth() });
    cursor.setMonth(cursor.getMonth() - 1);
  }

  months.forEach(function(mo) {
    var year = mo.year, month = mo.month;
    var block = document.createElement('div');
    block.className = 'mb-cal-month';

    var label = document.createElement('div');
    label.className = 'mb-cal-month-label';
    label.textContent = MONTH_NAMES[month] + ' ' + year;
    block.appendChild(label);

    var grid = document.createElement('div');
    grid.className = 'mb-cal-grid';

    DAY_NAMES.forEach(function(dn) {
      var h = document.createElement('div');
      h.className = 'mb-cal-hdr';
      h.textContent = dn;
      grid.appendChild(h);
    });

    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();

    for (var i = 0; i < firstDay; i++) {
      var e = document.createElement('div');
      e.className = 'mb-cal-cell empty';
      grid.appendChild(e);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var key = fmtKey(year, month, d);
      var brief = BRIEF_DATA[key];
      var isToday = key === TODAY_KEY;

      if (brief) {
        var a = document.createElement('a');
        a.href = brief.url;
        a.target = '_self';
        a.className = 'mb-cal-cell has-brief' + (isToday ? ' is-today' : '');
        var total = brief.int + brief.ext;
        var dots = '';
        if (brief.int) dots += '<span class="cdot cdot-int"></span>';
        if (brief.ext) dots += '<span class="cdot cdot-ext"></span>';
        a.innerHTML =
          '<span class="cell-day">' + d + '</span>' +
          '<span class="cell-count">' + total + ' mtg' + (total !== 1 ? 's' : '') + '</span>' +
          '<span class="cell-dots">' + dots + '</span>';
        grid.appendChild(a);
      } else {
        var c = document.createElement('div');
        c.className = 'mb-cal-cell' + (isToday ? ' is-today' : '');
        c.innerHTML = '<span class="cell-day">' + d + '</span>';
        grid.appendChild(c);
      }
    }

    block.appendChild(grid);
    wrap.appendChild(block);
  });

  var legend = document.createElement('div');
  legend.className = 'mb-cal-legend';
  legend.innerHTML =
    '<div class="mb-cal-legend-item"><span class="mb-cal-legend-dot cdot-int"></span> Internal</div>' +
    '<div class="mb-cal-legend-item"><span class="mb-cal-legend-dot cdot-ext"></span> External</div>';
  wrap.appendChild(legend);
}

// ── Load hub-data.json, render everything, then init ──────────────────────
function loadBriefData() {
  fetch('hub-data.json?v=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('hub-data.json ' + r.status);
      return r.json();
    })
    .then(function(data) {
      HUB_DATA = data;

      // Render report cards from JSON
      renderCards(data.cards || []);

      // Render morning briefs calendar
      BRIEF_DATA = data.morningBriefs || {};
      renderRecentCards();
      renderCalendar();

      // Wire up interactivity after all cards exist in DOM
      init();
    })
    .catch(function(err) {
      console.warn('Could not load hub-data.json:', err);
      init();
    });
}

// ── Boot ──────────────────────────────────────────────────────────────────
loadBriefData();

</script>
